name: Release tarball

on:
  release:
    types: [created]

permissions:
  contents: write
  statuses: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
      with:
        ref: ${{ github.event.release.tag_name }}

    - name: Check autotools status
      id: check_status
      uses: actions/github-script@v8
      with:
        script: |
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const tagName = context.payload.release.tag_name;
          const tagRef = await github.rest.git.getRef({
            owner,
            repo,
            ref: `tags/${tagName}`
          });

          let releaseCommit = tagRef.data.object.sha;
          if (tagRef.data.object.type === 'tag') {
            const tag = await github.rest.git.getTag({
              owner,
              repo,
              tag_sha: releaseCommit
            });
            releaseCommit = tag.data.object.sha;
          }

          const status = await github.rest.repos.getCombinedStatusForRef({
            owner,
            repo,
            ref: releaseCommit
          });
          const autotoolsStatus = status.data.statuses.find(s => s.context === 'autotools');
          if (!autotoolsStatus || autotoolsStatus.state !== 'success') {
            core.setFailed('Autotools build did not complete successfully');
          }

    - name: Install dependencies on Ubuntu
      run: |
        sudo apt-get update
        sudo apt-get install -y autoconf automake autopoint g++ gettext git libtool make texinfo texlive zsh

    - name: Check release metadata
      run: scripts/release/check.zsh --release ${{ github.event.release.tag_name }}

    - name: Run autogen
      run: ./autogen.sh

    - name: Configure
      run: |
        export CC=gcc CXX=g++
        ./configure

    - name: Build and Test
      run: make -j distcheck

    - name: Check distribution tarball
      run: scripts/release/check.zsh --release --require-dist ${{ github.event.release.tag_name }}

    - name: Upload Release Asset
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG_NAME: ${{ github.event.release.tag_name }}
      run: |
        gh release upload "${TAG_NAME}" \
          "./fswatch-${TAG_NAME}.tar.gz#fswatch-${TAG_NAME}.tar.gz" \
          --repo "${GITHUB_REPOSITORY}" \
          --clobber

    - name: Build PDF documentation
      run: make -j pdf

    - name: Upload Release PDF documentation
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG_NAME: ${{ github.event.release.tag_name }}
      run: |
        gh release upload "${TAG_NAME}" \
          "./fswatch/doc/fswatch.pdf#fswatch-${TAG_NAME}.pdf" \
          --repo "${GITHUB_REPOSITORY}" \
          --clobber
